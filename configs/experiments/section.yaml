# Ablation: section-aware chunking (split on markdown headings first), dense.
# Keeps a heading's content together and tags each chunk with its heading, so a
# "Mechanism of Action" section becomes its own chunk rather than being glued to
# the off-label paragraph before it. Comparable to `default` on retrieval mode.
# NOTE: requires a re-ingest with THIS config before evaluating
#   (`rag ingest -c configs/experiments/section.yaml` then `rag eval -c ...`).
name: section

chunk:
  strategy: section
  chunk_size: 512
  chunk_overlap: 64
  clean_boilerplate: true

embed:
  model: BAAI/bge-base-en-v1.5
  dim: 768
  normalize: true

retrieval:
  mode: dense
  top_k: 20
  rrf_k: 60

rerank:
  enabled: false
  model: BAAI/bge-reranker-base
  top_n: 5

generation:
  model: medrag-qwen
  ollama_host: http://localhost:11434
  n_ctx: 4096
  max_tokens: 512
  temperature: 0.1
  top_p: 0.9
  context_chunks: 5
  keep_alive: 5m
