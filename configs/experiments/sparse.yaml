# Ablation: sparse (full-text / BM25-style) retrieval only.
# Isolates the lexical leg — useful to see what term-matching catches that dense
# misses (and vice versa) before fusing them in hybrid.
name: sparse

chunk:
  strategy: recursive
  chunk_size: 512
  chunk_overlap: 64

embed:
  model: BAAI/bge-base-en-v1.5
  dim: 768
  normalize: true

retrieval:
  mode: sparse
  top_k: 20
  rrf_k: 60

rerank:
  enabled: false
  model: BAAI/bge-reranker-base
  top_n: 5

generation:
  model: medrag-qwen
  ollama_host: http://localhost:11434
  n_ctx: 4096
  max_tokens: 512
  temperature: 0.1
  top_p: 0.9
  context_chunks: 5
  keep_alive: 5m
