# The tuned pipeline: every measured win combined.
#   - 256-token chunks (the big lever: recall@20 0.882 -> 0.971, rescued 3/4 misses)
#   - boilerplate cleaning on
#   - hybrid retrieval (dense + sparse, RRF) for the widest candidate net
#   - cross-encoder reranking to sort the top
# This is the config Step 6 compares end-to-end against the naive `default` baseline.
# NOTE: re-ingest with THIS config first (256-token chunks):
#   rag ingest -c configs/experiments/tuned.yaml  &&  rag eval -c configs/experiments/tuned.yaml
name: tuned

chunk:
  strategy: recursive
  chunk_size: 256
  chunk_overlap: 32
  clean_boilerplate: true

embed:
  model: BAAI/bge-base-en-v1.5
  dim: 768
  normalize: true

retrieval:
  mode: hybrid
  top_k: 20
  rrf_k: 60

rerank:
  enabled: true
  model: BAAI/bge-reranker-base
  top_n: 5

generation:
  model: medrag-qwen
  ollama_host: http://localhost:11434
  n_ctx: 4096
  max_tokens: 512
  temperature: 0.1
  top_p: 0.9
  context_chunks: 5
  keep_alive: 5m
