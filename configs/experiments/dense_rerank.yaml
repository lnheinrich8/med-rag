# Ablation: dense retrieval + cross-encoder reranking.
# Identical to configs/default.yaml except rerank.enabled = true, so any metric
# delta vs the `default` baseline is attributable to the reranker alone.
name: dense_rerank

chunk:
  strategy: recursive
  chunk_size: 512
  chunk_overlap: 64

embed:
  model: BAAI/bge-base-en-v1.5
  dim: 768
  normalize: true

retrieval:
  mode: dense
  top_k: 20                # cross-encoder reorders all 20 candidates
  rrf_k: 60

rerank:
  enabled: true
  model: BAAI/bge-reranker-base
  top_n: 5                 # kept after reranking, fed to the LLM

generation:
  model: medrag-qwen
  ollama_host: http://localhost:11434
  n_ctx: 4096
  max_tokens: 512
  temperature: 0.1
  top_p: 0.9
  context_chunks: 5
  keep_alive: 5m
