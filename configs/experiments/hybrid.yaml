# Ablation: hybrid retrieval (dense + sparse fused with RRF), no reranker.
# Targets the dense-only hard misses by giving term-matched chunks a second path
# into the top_k. Compare recall@20 vs `default` (dense) to see the ceiling rise.
name: hybrid

chunk:
  strategy: recursive
  chunk_size: 512
  chunk_overlap: 64

embed:
  model: BAAI/bge-base-en-v1.5
  dim: 768
  normalize: true

retrieval:
  mode: hybrid
  top_k: 20                # per-leg depth AND fused depth returned
  rrf_k: 60                # RRF damping constant

rerank:
  enabled: false
  model: BAAI/bge-reranker-base
  top_n: 5

generation:
  model: medrag-qwen
  ollama_host: http://localhost:11434
  n_ctx: 4096
  max_tokens: 512
  temperature: 0.1
  top_p: 0.9
  context_chunks: 5
  keep_alive: 5m
